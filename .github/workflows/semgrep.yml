name: GitHub Actions Security Analysis with Semgrep

on:
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  semgrep:
    name: Run semgrep scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required for upload-sarif to upload SARIF files
      contents: read         # Needed to clone the repo
      actions: read          # Needed for upload-sarif to read workflow run info
    container:
      # A Docker image with Semgrep installed. Do not change this.
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Perform Semgrep Analysis
        run: semgrep scan --sarif --config "p/github-actions" --output semgrep.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: semgrep.sarif
