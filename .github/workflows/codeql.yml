name: "CodeQL Security Analysis"

on:
  #push:
  #  branches: ["main"]
  #  paths:
  #    - '.github/workflows/**'
  pull_request:
    branches: ["main"]
    paths:
      - '.github/workflows/**'
#  schedule:
#    # Run weekly on Mondays at 10 AM UTC
#    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze GitHub Actions Workflows
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required to upload SARIF results
      actions: read          # Required to read workflow information
      contents: read         # Required to checkout repository

    strategy:
      fail-fast: false
      matrix:
        language: ['actions']  # Analyze GitHub Actions workflows

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          languages: ${{ matrix.language }}
          # Optional: Specify custom queries
          # queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          # Upload SARIF results to GitHub Security tab
          output: sarif-results

      - name: Upload SARIF results as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: codeql-results
          path: sarif-results
          retention-days: 7
